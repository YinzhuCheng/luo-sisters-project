name: Harness Pages

on:
  push:
    paths:
      - 'locales/**'
      - 'project_data/**'
      - 'characters/*.json'
      - 'assets/styles/**'
      - 'tools/build_project_html.py'
      - 'tools/browser_smoke_check.py'
      - 'character_sheets/**'
      - 'en/character_sheets/**'
      - 'knowledge/**'
      - 'en/knowledge/**'
      - 'docs/browser_automation.md'
      - 'requirements-browser.txt'
      - '.github/workflows/harness-pages.yml'
  pull_request:
    paths:
      - 'locales/**'
      - 'project_data/**'
      - 'characters/*.json'
      - 'assets/styles/**'
      - 'tools/build_project_html.py'
      - 'tools/browser_smoke_check.py'
      - 'character_sheets/**'
      - 'en/character_sheets/**'
      - 'knowledge/**'
      - 'en/knowledge/**'
      - 'docs/browser_automation.md'
      - 'requirements-browser.txt'
      - '.github/workflows/harness-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  page-harness:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: knowledge
            packet: harness/tasks/knowledge-page-structure.json
          - name: smoke
            packet: harness/tasks/site-smoke-check.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install browser dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-browser.txt
          python -m playwright install --with-deps chromium

      - name: Run page harness packet
        id: page_run
        continue-on-error: true
        run: |
          python tools/run_harness_task.py "${{ matrix.packet }}" --github-output "$GITHUB_OUTPUT"

      - name: Apply warn-then-gate
        if: always()
        run: |
          python tools/harness_warn_then_gate.py "${{ matrix.packet }}" --run-dir "${{ steps.page_run.outputs.run_dir }}"

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-pages-${{ github.run_id }}-${{ matrix.name }}
          path: ${{ steps.page_run.outputs.run_dir }}
